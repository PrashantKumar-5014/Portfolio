<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#g)"/>

  <!-- Subtle dot grid -->
  <circle cx="12" cy="12" r="1.2" fill="white" opacity="0.15"/>
  <circle cx="32" cy="12" r="1.2" fill="white" opacity="0.15"/>
  <circle cx="52" cy="12" r="1.2" fill="white" opacity="0.15"/>
  <circle cx="12" cy="32" r="1.2" fill="white" opacity="0.15"/>
  <circle cx="52" cy="32" r="1.2" fill="white" opacity="0.15"/>
  <circle cx="12" cy="52" r="1.2" fill="white" opacity="0.15"/>
  <circle cx="32" cy="52" r="1.2" fill="white" opacity="0.15"/>
  <circle cx="52" cy="52" r="1.2" fill="white" opacity="0.15"/>

  <!-- P letter -->
  <rect x="8" y="14" width="4.5" height="36" rx="2" fill="white"/>
  <rect x="8" y="14" width="22" height="4.5" rx="2" fill="white"/>
  <rect x="8" y="28" width="22" height="4.5" rx="2" fill="white"/>
  <rect x="25.5" y="14" width="4.5" height="18.5" rx="2" fill="white"/>

  <!-- K letter -->
  <rect x="34" y="14" width="4.5" height="36" rx="2" fill="white"/>
  <rect x="36" y="18" width="18" height="4" rx="2" fill="white" transform="rotate(37 36 18)"/>
  <rect x="36" y="44" width="18" height="4" rx="2" fill="white" transform="rotate(-37 36 46)"/>

  <!-- Dot accent -->
  <circle cx="57" cy="57" r="3.5" fill="white" opacity="0.9"/>
</svg>